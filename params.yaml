# Single source of truth for pipeline parameters (one section per DVC stage).

preprocess:
  min_interactions: 5
  event_weights:
    view: 1.0
    addtocart: 3.0
    transaction: 5.0

feature_eng:
  val_size: 1    # interactions per user held out for validation (early stopping)
  test_size: 1   # interactions per user held out for test (leave-last-out)

train:
  model: ncf   # one of: popularity | item_knn | svd | ncf
  seed: 42
  configs:
    popularity:
      top_n: 500
    item_knn:
      history_cap: 50
    svd:
      n_components: 64
    ncf:
      embedding_dim: 32
      hidden_dims: [64, 32]
      dropout: 0.2
      learning_rate: 0.001
      batch_size: 4096
      epochs: 50
      n_negatives: 4
      patience: 3

evaluate:
  top_k: 10
  n_negatives: 99   # NCF-paper protocol: rank the positive against 99 unseen items
  seed: 42
